<!DOCTYPE html>
<html data-theme="light" lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Contact - Wellsplit</title>
  
  <!-- Your shared CSS file -->
  <link rel="stylesheet" href="/components/styles.css">
  
  <!-- Google AdSense tag (if needed) -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1724135069833024" crossorigin="anonymous"></script>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-VR5ESWGW9Y"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-VR5ESWGW9Y');
  </script>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/files/favicon.png">

  <style>
    /* Push footer to bottom */
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    main {
      flex: 1;
      padding: 42px 6% 32px;
    }

    #footer-container {
      margin-top: auto;
    }

    /* Contact page specific styles */
    .contact-card {
      background: transparent;
      border: none;
      border-radius: var(--radius);
      padding: 35px;
      box-shadow: none;
      margin: 20px 0;
      font-family: Arial, sans-serif;
    }

    .contact-card h1 {
      margin-top: 0;
      font-size: clamp(2rem, 5vw, 2.8rem);
      letter-spacing: -0.03em;
      font-family: Arial, sans-serif;
    }

    .contact-card p {
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.95rem;
      font-family: Arial, sans-serif;
    }

    .email-box {
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      padding: 18px 22px;
      border-radius: 12px;
      margin: 20px 0;
      border-left: 4px solid var(--accent);
      font-size: 1rem;
      color: var(--text);
      font-family: Arial, sans-serif;
    }

    .email-box strong {
      color: var(--accent);
    }

    .content-layout {
      width: min(100%, 1180px);
      margin: 0 auto;
    }

    .page-shell {
      width: 100%;
      max-width: 850px;
      margin: 0 auto;
    }

    @media (max-width: 780px) {
      main {
        padding: 34px 18px 26px;
      }
      
      .contact-card {
        padding: 25px;
      }
      
      .email-box {
        padding: 14px 16px;
        font-size: 0.95rem;
      }
    }

    @media (max-width: 420px) {
      .contact-card {
        padding: 18px;
      }
      
      .email-box {
        padding: 12px 14px;
        font-size: 0.9rem;
        word-break: break-all;
      }
    }
  </style>
</head>

<body>
  <!-- Navbar loads here -->
  <div id="navbar-container"></div>

  <main>
    <div class="content-layout">
      <div class="page-shell">
        <div class="contact-card">
          <h1>Contact Us</h1>

          <p>
            If you have any questions, feedback, or suggestions, feel free to reach out. 
            We'd love to hear from you!
          </p>

          <div class="email-box">
            📧 <strong>Email:</strong> wellsplit.calculator@gmail.com
          </div>

          <p>
            We usually respond within <strong>24–48 hours</strong>.
          </p>

          <p>
            Your feedback helps us improve Wellsplit and make it better for everyone.
          </p>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer loads here -->
  <div id="footer-container"></div>

  <!-- Load shared.js -->
  <script src="/components/shared.js"></script>
</body>
</html>
