<!DOCTYPE html>
<html data-theme="light" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact - Wellsplit</title>

  <!-- Your shared CSS file -->
  <link rel="stylesheet" href="/components/styles.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #222;
      height: 100%;
    }

    .container {
      max-width: 850px;
      margin: 50px auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 35px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    p {
      line-height: 1.6;
      font-size: 16px;
      color: #444;
      margin-bottom: 20px;
    }

    .email-box {
      background: #f0f4ff;
      padding: 15px;
      border-radius: 8px;
      margin-top: 15px;
      font-size: 16px;
      border-left: 4px solid #4a6cf7;
    }
  </style>
</head>

<body>
  <div id="navbar-container"></div>

  <main>
    <div class="container">
      <div class="card">
        <h1>Contact Us</h1>

        <p>
          If you have any questions, feedback, or suggestions, feel free to reach out.
        </p>

        <div class="email-box">
          📧 Email: wellsplit.calculator@gmail.com
        </div>

        <p>
          We usually respond within 24–48 hours.
        </p>

        <p>
          We appreciate your feedback as it helps us improve Wellsplit.
        </p>
      </div>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="/components/shared.js"></script>
</body>
</html>
